<?xml version="1.0"?>
<!DOCTYPE busconfig PUBLIC "-//freedesktop//DTD D-BUS Bus Configuration 1.0//EN"
        "https://www.freedesktop.org/standards/dbus/1.0/busconfig.dtd">

<!--
  SPDX-License-Identifier: GPL-2.0-or-later

  System-bus policy for mizd (org.archetype.miz1). root owns the name; any
  user may call the methods. Per-method authorization is enforced by polkit
  inside the daemon (org.archetype.miz1.policy), not by this bus policy.
-->

<busconfig>

        <policy user="root">
                <allow own="org.archetype.miz1"/>
                <allow send_destination="org.archetype.miz1"/>
                <allow receive_sender="org.archetype.miz1"/>
        </policy>

        <policy context="default">
                <allow send_destination="org.archetype.miz1"/>
                <allow receive_sender="org.archetype.miz1"/>
        </policy>

</busconfig>
