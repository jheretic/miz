#
# Minimal pacman.conf for miz integration tests.
#
# The values of RootDir, DBPath, CacheDir, LogFile, and GPGDir are
# placeholders rewritten at test runtime by `make_test_root()` in
# `tests/common/mod.rs`. Do not edit these lines by hand without also
# updating the substitution table in the helper.
#
# No `Include` directives; no servers; pacman-conf must still be
# available on the host for `alpm_utils::config::Config::with_opts`
# to parse this file. See tests/fixtures/README.md.
#

[options]
RootDir     = @ROOTDIR@
DBPath      = @DBPATH@
CacheDir    = @CACHEDIR@
LogFile     = @LOGFILE@
GPGDir      = @GPGDIR@
HoldPkg     = pacman
Architecture = auto
SigLevel    = Never
LocalFileSigLevel = Never

[core]
# Intentionally empty: transaction tests do not refresh.
